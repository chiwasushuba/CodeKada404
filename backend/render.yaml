services:
  - type: web
    name: central-brain-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8080
      - key: LOG_LEVEL
        value: info
      - key: DEBUG
        value: false
      - key: RELOAD
        value: false
      - key: MONGODB_URI
        scope: secret
      - key: PINECONE_API_KEY
        scope: secret
      - key: PINECONE_ENVIRONMENT
        scope: secret
      - key: GOOGLE_API_KEY
        scope: secret
      - key: AWS_ACCESS_KEY_ID
        scope: secret
      - key: AWS_SECRET_ACCESS_KEY
        scope: secret
      - key: AWS_S3_BUCKET_NAME
        scope: secret
      - key: AWS_S3_ENDPOINT_URL
        scope: secret
      - key: CORS_ORIGINS
        value: '["https://your-frontend.vercel.app"]'
